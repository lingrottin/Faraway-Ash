{% extends "base.html" %} {% block content %} {% if config.extra.banner_img %}
<div class="">
    <style>
        #banner-img {
            background-image: url("{{ config.extra.banner_img | replace(from="$BASE_URL", to=config.base_url) |safe}}");
            background-size: cover;
            background-position: center;
        }
        #banner-img:after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse 200% 100% at top,
                transparent,
                transparent 85%,
                var(--background)
            );
        }
    </style>
    <div
        id="banner-img"
        class="h-[60dvh] w-screen relative overflow-hidden flex justify-center items-center"
    >
        <div class="flex flex-col items-start">
            <div
                class="font-bold text-3xl backdrop-blur-lg bg-background/50 py-3 px-5"
            >
                404 Not Found
            </div>
        </div>
    </div>
</div>
{% endif %}
<div
    class="{%if not config.extra.banner_img %}mt-19 {%else%}mt-4 {%endif%}container mx-auto flex flex-col not-md:px-4"
>
    <div class="content"><p>您访问的页面不存在或已被移除。</p></div>
    <a
        href="/"
        class="mt-6 text-muted-foreground hover:underline hover:text-foreground flex flex-row items-center"
    >
        <i data-lucide="arrow-left" class="mr-2"></i>
        <div>回到主页</div>
    </a>
</div>
{%endblock%}
