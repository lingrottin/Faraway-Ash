{% if config.extra.banner_img %}
<div class="">
    <style>
        #banner-img {
            background-image: url("{{ config.extra.banner_img | replace(from="$BASE_URL", to=config.base_url) |safe}}");
            background-size: cover;
            background-position: center;
        }
        #banner-img:after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse 200% 100% at top,
                transparent,
                transparent 85%,
                var(--background)
            );
        }
    </style>
    <div
        id="banner-img"
        class="h-[60dvh] w-screen relative overflow-hidden"
    ></div>
</div>
{% endif %}
